name: Cache Secret Deploy No Restore Impact

on:
  workflow_dispatch:
    inputs:
      base_key:
        description: ASCII base key. Trusted primary is <base>-prod; hidden seed is expected to be <base>-prod<U+200B>.
        required: true
        default: secret-deploy-no-restore

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve no-restore deploy key
        id: key
        shell: bash
        env:
          BASE_KEY: ${{ inputs.base_key }}
        run: |
          set -euo pipefail
          mkdir -p observations
          node <<'NODE'
          const fs = require('node:fs');

          function describe(value) {
            return {
              value,
              length: value.length,
              byteLength: Buffer.byteLength(value),
              utf8Hex: Buffer.from(value, 'utf8').toString('hex'),
              codePoints: [...value].map(char =>
                `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')}`
              )
            };
          }

          const base = process.env.BASE_KEY || '';
          const primaryKey = `${base}-prod`;
          const expectedHiddenKey = `${primaryKey}\u200b`;
          const metadata = {
            event: 'workflow_dispatch',
            primaryKey: describe(primaryKey),
            expectedHiddenKey: describe(expectedHiddenKey),
            restoreKeys: [],
            runId: process.env.GITHUB_RUN_ID
          };

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `primary_key<<EOF\n${primaryKey}\nEOF\n`);
          fs.writeFileSync('observations/no-restore-key.json', `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

      - name: Restore deploy tool cache without restore-keys
        id: cache
        uses: actions/cache@v6
        with:
          path: deploy-tools
          key: ${{ steps.key.outputs.primary_key }}

      - name: Record cache outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "restore-keys-used=false"
            echo "cache-hit=${{ steps.cache.outputs.cache-hit }}"
            echo "cache-primary-key=${{ steps.cache.outputs.cache-primary-key }}"
            echo "cache-matched-key=${{ steps.cache.outputs.cache-matched-key }}"
            echo "trusted-primary-key=${{ steps.key.outputs.primary_key }}"
          } | tee observations/cache-outputs.txt

      - name: Stop unless exact cache hit is reported
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "exact-cache-required=true" | tee observations/exact-gate-failed.txt
          exit 1

      - name: Deploy using cached tool with secret
        shell: bash
        env:
          LAB_DEPLOY_SECRET: ${{ secrets.LAB_DEPLOY_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p observations
          if [[ -x deploy-tools/deploy.sh ]]; then
            ./deploy-tools/deploy.sh | tee observations/deploy-output.txt
          else
            printf 'deploy-tool-missing=true\n' | tee observations/deploy-output.txt
            exit 1
          fi

      - name: Inspect observations
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find deploy-tools observations -maxdepth 3 -type f -print -exec sed -n '1,80p' {} \; || true

      - name: Upload observations
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cache-secret-deploy-no-restore-impact-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations/
          if-no-files-found: warn
