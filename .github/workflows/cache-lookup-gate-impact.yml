name: Cache Lookup Gate Impact

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Seed hidden cache or probe a visible exact-hit gate.
        type: choice
        required: true
        default: seed-hidden
        options:
          - seed-hidden
          - probe-visible
      base_key:
        description: ASCII base key shared by the seed and probe runs.
        required: true
        default: lookup-gate-impact

permissions:
  actions: write
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve cache key
        id: key
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          BASE_KEY: ${{ inputs.base_key }}
        run: |
          set -euo pipefail
          mkdir -p observations sentinel-cache
          node <<'NODE'
          const fs = require('node:fs');

          const mode = process.env.MODE;
          const base = process.env.BASE_KEY;
          const suffix = mode === 'seed-hidden' ? `pro\u200bd` : 'prod';
          const key = `${base}-${suffix}`;
          const restoreKey = `${base}-pro`;

          function describe(value) {
            return {
              value,
              length: value.length,
              byteLength: Buffer.byteLength(value),
              utf8Hex: Buffer.from(value, 'utf8').toString('hex'),
              codePoints: [...value].map(char =>
                `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')}`
              )
            };
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `cache_key<<EOF\n${key}\nEOF\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `restore_key<<EOF\n${restoreKey}\nEOF\n`);
          fs.writeFileSync(
            'observations/key.json',
            `${JSON.stringify({mode, key: describe(key), restoreKey: describe(restoreKey)}, null, 2)}\n`
          );
          fs.writeFileSync(
            'sentinel-cache/sentinel.txt',
            `sentinel-key=${key}\ncreated-by-run=${process.env.GITHUB_RUN_ID}\n`
          );
          NODE

      - name: Restore or lookup sentinel cache
        id: cache
        uses: actions/cache@v6
        with:
          path: sentinel-cache
          key: ${{ steps.key.outputs.cache_key }}
          restore-keys: ${{ steps.key.outputs.restore_key }}
          lookup-only: ${{ inputs.mode == 'probe-visible' }}

      - name: Record cache outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "cache-hit=${{ steps.cache.outputs.cache-hit }}"
            echo "cache-primary-key=${{ steps.cache.outputs.cache-primary-key }}"
            echo "cache-matched-key=${{ steps.cache.outputs.cache-matched-key }}"
          } | tee observations/cache-outputs.txt

      - name: Stop unless exact cache hit is reported
        if: ${{ inputs.mode == 'probe-visible' && steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "exact-cache-required=true" | tee observations/exact-gate-failed.txt
          exit 1

      - name: Deploy after lookup gate
        if: ${{ inputs.mode == 'probe-visible' }}
        shell: bash
        env:
          LAB_DEPLOY_SECRET: ${{ secrets.LAB_DEPLOY_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "deploy-gate-passed=true"
            echo "secret-visible-to-deploy=$([[ -n \"${LAB_DEPLOY_SECRET:-}\" ]] && echo true || echo false)"
            echo "lookup-only-no-download=true"
            echo "deploy-target=production"
          } | tee observations/deploy-output.txt

      - name: Inspect observations
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find sentinel-cache observations -maxdepth 2 -type f -print -exec sed -n '1,30p' {} \; || true

      - name: Upload observations
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cache-lookup-gate-impact-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations/
          if-no-files-found: warn
