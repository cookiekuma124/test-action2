name: Cache Secret Deploy Impact

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Seed a hidden-character cache or probe with the visible primary key.
        type: choice
        required: true
        default: seed-hidden
        options:
          - seed-hidden
          - probe-visible
      base_key:
        description: ASCII base key shared by the seed and probe runs.
        required: true
        default: secret-deploy-impact

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve cache key
        id: key
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          BASE_KEY: ${{ inputs.base_key }}
        run: |
          set -euo pipefail
          mkdir -p observations
          node <<'NODE'
          const fs = require('node:fs');

          const mode = process.env.MODE;
          const base = process.env.BASE_KEY;
          const hiddenSuffix = `pro\u200bd`;
          const visibleSuffix = 'prod';
          const suffix = mode === 'seed-hidden' ? hiddenSuffix : visibleSuffix;
          const key = `${base}-${suffix}`;
          const restoreKey = `${base}-pro`;
          const toolLabel =
            mode === 'seed-hidden' ? 'seeded-hidden-deploy-tool' : 'fresh-visible-deploy-tool';

          function describe(value) {
            return {
              value,
              length: value.length,
              byteLength: Buffer.byteLength(value),
              utf8Hex: Buffer.from(value, 'utf8').toString('hex'),
              codePoints: [...value].map(char =>
                `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')}`
              )
            };
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `cache_key<<EOF\n${key}\nEOF\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `restore_key<<EOF\n${restoreKey}\nEOF\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tool_label=${toolLabel}\n`);
          fs.writeFileSync(
            'observations/key.json',
            `${JSON.stringify(
              {
                mode,
                key: describe(key),
                restoreKey: describe(restoreKey),
                toolLabel
              },
              null,
              2
            )}\n`
          );
          NODE

      - name: Restore deploy tool cache
        id: cache
        uses: actions/cache@v6
        with:
          path: deploy-tools
          key: ${{ steps.key.outputs.cache_key }}
          restore-keys: ${{ steps.key.outputs.restore_key }}

      - name: Record cache outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "cache-hit=${{ steps.cache.outputs.cache-hit }}"
            echo "cache-primary-key=${{ steps.cache.outputs.cache-primary-key }}"
            echo "cache-matched-key=${{ steps.cache.outputs.cache-matched-key }}"
          } | tee observations/cache-outputs.txt

      - name: Prepare deploy tool when cache is not exact
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          TOOL_LABEL: ${{ steps.key.outputs.tool_label }}
          CACHE_KEY: ${{ steps.key.outputs.cache_key }}
        run: |
          set -euo pipefail
          mkdir -p deploy-tools observations
          cat > deploy-tools/deploy.sh <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          echo "tool-label=${TOOL_LABEL}"
          echo "tool-cache-key=${CACHE_KEY}"
          echo "tool-created-run-id=${GITHUB_RUN_ID}"
          if [[ -n "\${LAB_DEPLOY_SECRET:-}" ]]; then
            echo "secret-visible-to-tool=true"
          else
            echo "secret-visible-to-tool=false"
          fi
          echo "deploy-target=production"
          EOF
          chmod +x deploy-tools/deploy.sh
          printf 'prepare-ran=true\n' | tee observations/prepare-ran.txt

      - name: Stop unless exact cache hit is reported
        if: ${{ inputs.mode == 'probe-visible' && steps.cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "exact-cache-required=true" | tee observations/exact-gate-failed.txt
          exit 1

      - name: Deploy using cached tool with secret
        if: ${{ inputs.mode == 'probe-visible' }}
        shell: bash
        env:
          LAB_DEPLOY_SECRET: ${{ secrets.LAB_DEPLOY_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p observations
          if [[ -x deploy-tools/deploy.sh ]]; then
            ./deploy-tools/deploy.sh | tee observations/deploy-output.txt
          else
            printf 'deploy-tool-missing=true\n' | tee observations/deploy-output.txt
            exit 1
          fi

      - name: Inspect observations
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find deploy-tools observations -maxdepth 2 -type f -print -exec sed -n '1,30p' {} \; || true

      - name: Upload observations
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cache-secret-deploy-impact-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations/
          if-no-files-found: warn
